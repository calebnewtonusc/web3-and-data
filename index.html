<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Journey Tracker — Protocol Forge & Tesla Data Engineer</title>
    <meta
      name="description"
      content="Two-track journey tracker: Protocol Forge (deep smart contract engineer) and Tesla Data Engineer (FleetPulse portfolio + interview prep)."
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ["Inter", "system-ui", "-apple-system", "sans-serif"] },
            colors: {
              action: "#0066cc",
              actionfocus: "#0071e3",
              sky: "#2997ff",
              ink: "#1d1d1f",
              inkmuted: "#7a7a7a",
              inkmuted80: "#333333",
              parchment: "#f5f5f7",
              pearl: "#fafafc",
              tile: "#272729",
              tile2: "#2a2a2c",
              tile3: "#252527",
              hairline: "#e0e0e0",
              dividersoft: "#f0f0f0",
            },
            borderRadius: { apple: "8px", applemd: "11px", applelg: "18px" },
          },
        },
      };
    </script>
    <style>
      html {
        scroll-behavior: smooth;
      }
      body {
        font-feature-settings: "ss03";
        -webkit-font-smoothing: antialiased;
        background: #ffffff;
        color: #1d1d1f;
      }
      #progress-bar {
        position: fixed;
        top: 0;
        left: 0;
        height: 2px;
        width: 0%;
        background: #0066cc;
        z-index: 60;
        transition: width 0.1s linear;
      }
      .reveal {
        opacity: 0;
        transform: translateY(24px);
        transition:
          opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1),
          transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .reveal.visible {
        opacity: 1;
        transform: translateY(0);
      }
      .press {
        transition: transform 0.15s ease;
      }
      .press:active {
        transform: scale(0.95);
      }
      details > summary {
        list-style: none;
      }
      details > summary::-webkit-details-marker {
        display: none;
      }
      details[open] .chev {
        transform: rotate(90deg);
      }
      .chev {
        transition: transform 0.2s ease;
      }
      .ring-progress {
        transition: stroke-dashoffset 0.6s cubic-bezier(0.22, 1, 0.36, 1);
      }
      ::selection {
        background: rgba(0, 102, 204, 0.18);
      }
      @media (prefers-reduced-motion: reduce) {
        .reveal {
          opacity: 1;
          transform: none;
          transition: none;
        }
        html {
          scroll-behavior: auto;
        }
      }
    </style>
  </head>
  <body class="font-sans">
    <div id="progress-bar"></div>

    <!-- Global nav: persistent thin black bar -->
    <nav class="fixed top-0 inset-x-0 z-50 bg-black text-white" style="height: 44px">
      <div class="max-w-[1440px] mx-auto h-full px-6 flex items-center justify-between">
        <a href="#top" class="flex items-center gap-2 press">
          <i data-lucide="hexagon" class="w-[15px] h-[15px] text-white"></i>
          <span class="text-[12px] font-normal tracking-[-0.12px]" id="navTitle">Journey</span>
        </a>
        <div class="hidden md:flex items-center gap-[18px]" id="navWeeks"></div>
        <span id="navPct" class="text-[12px] tracking-[-0.12px] text-white/70 tabular-nums">0%</span>
      </div>
    </nav>

    <!-- Sub-nav: frosted parchment strip -->
    <div
      class="fixed top-[44px] inset-x-0 z-40 border-b border-hairline"
      style="
        height: 52px;
        background: rgba(245, 245, 247, 0.8);
        backdrop-filter: saturate(180%) blur(20px);
        -webkit-backdrop-filter: saturate(180%) blur(20px);
      "
    >
      <div class="max-w-[1440px] mx-auto h-full px-6 flex items-center justify-between">
        <span class="text-[21px] font-semibold tracking-[0.231px] text-ink" id="subTitle">Journey Tracker</span>
        <div class="flex items-center gap-4">
          <span class="hidden sm:inline text-[14px] tracking-[-0.224px] text-inkmuted tabular-nums" id="subStats"></span>
          <button
            id="resetBtn"
            class="press text-[14px] tracking-[-0.224px] text-action hover:text-actionfocus"
            aria-label="Reset progress for this track"
          >
            Reset
          </button>
        </div>
      </div>
    </div>

    <div style="height: 96px" id="top"></div>

    <!-- Hero -->
    <header class="bg-parchment">
      <div class="max-w-[1440px] mx-auto px-6 py-16 md:py-[72px]">
        <!-- Track switcher (segmented control) -->
        <div class="reveal inline-flex items-center gap-1 rounded-full border border-hairline bg-white p-1 mb-8" id="trackSwitch" role="tablist"></div>

        <div class="max-w-[860px]">
          <span
            class="reveal inline-flex items-center gap-2 rounded-full border border-hairline bg-white px-4 py-1.5 text-[14px] tracking-[-0.224px] text-inkmuted80"
          >
            <i data-lucide="calendar-days" class="w-4 h-4 text-action"></i>
            <span id="rangeLabel"></span>
          </span>
          <h1
            id="heroTitle"
            class="reveal mt-6 text-[40px] md:text-[56px] font-semibold leading-[1.07] tracking-[-0.28px] text-ink"
          ></h1>
          <p id="heroSubtitle" class="reveal mt-4 text-[21px] md:text-[28px] font-normal leading-[1.14] tracking-[0.196px] text-inkmuted80"></p>
        </div>

        <!-- Stat cards -->
        <div class="mt-12 grid grid-cols-1 lg:grid-cols-3 gap-6">
          <div class="reveal bg-white border border-hairline rounded-applelg p-6 flex items-center gap-6">
            <div class="relative shrink-0">
              <svg width="112" height="112" viewBox="0 0 112 112" class="-rotate-90">
                <circle cx="56" cy="56" r="48" fill="none" stroke="#e6e6e6" stroke-width="8" />
                <circle id="ringMain" cx="56" cy="56" r="48" fill="none" stroke="#0066cc" stroke-width="8" stroke-linecap="round" class="ring-progress" stroke-dasharray="301.6" stroke-dashoffset="301.6" />
              </svg>
              <div class="absolute inset-0 flex items-center justify-center">
                <span id="ringPct" class="text-[28px] font-semibold tracking-[-0.5px] text-ink tabular-nums">0%</span>
              </div>
            </div>
            <div>
              <div class="text-[14px] tracking-[-0.224px] text-inkmuted">Overall</div>
              <div class="mt-1 text-[34px] font-semibold leading-none tracking-[-0.374px] text-ink tabular-nums">
                <span id="tasksDone">0</span><span class="text-hairline">/<span id="tasksTotal">0</span></span>
              </div>
              <div class="text-[14px] tracking-[-0.224px] text-inkmuted mt-1">tasks completed</div>
            </div>
          </div>

          <div class="reveal bg-white border border-hairline rounded-applelg p-6 flex flex-col justify-center">
            <div class="flex items-center gap-2 text-inkmuted mb-2">
              <i data-lucide="check-circle-2" class="w-4 h-4"></i>
              <span class="text-[14px] tracking-[-0.224px]" id="unitLabel">Modules complete</span>
            </div>
            <div class="text-[40px] font-semibold leading-none tracking-[-0.5px] text-ink tabular-nums">
              <span id="itemsDone" class="text-action">0</span>
              <span class="text-hairline text-[28px]">/ <span id="itemsTotal">0</span></span>
            </div>
            <div class="mt-4 h-1.5 bg-dividersoft rounded-full overflow-hidden">
              <div id="itemsBar" class="h-full bg-action rounded-full transition-all duration-500" style="width: 0%"></div>
            </div>
          </div>

          <div class="reveal bg-white border border-hairline rounded-applelg p-6 flex flex-col justify-center">
            <div class="flex items-center gap-2 text-inkmuted mb-2">
              <i data-lucide="flag" class="w-4 h-4"></i>
              <span class="text-[14px] tracking-[-0.224px]" id="mileLabel">Milestones passed</span>
            </div>
            <div class="text-[40px] font-semibold leading-none tracking-[-0.5px] text-ink tabular-nums">
              <span id="milesDone" class="text-action">0</span>
              <span class="text-hairline text-[28px]">/ <span id="milesTotal">0</span></span>
            </div>
            <div class="mt-4 flex flex-wrap gap-1.5" id="mileDots"></div>
          </div>
        </div>
      </div>
    </header>

    <!-- Mission tile (dark) -->
    <section class="bg-tile text-white">
      <div class="max-w-[1440px] mx-auto px-6 py-14 md:py-[72px]">
        <div class="reveal max-w-[920px]">
          <div class="text-[14px] tracking-[-0.224px] text-white/50 uppercase">The Standard</div>
          <p id="missionText" class="mt-3 text-[24px] md:text-[34px] font-semibold leading-[1.2] tracking-[-0.374px]"></p>
        </div>
      </div>
    </section>

    <!-- Groups render here -->
    <main id="groups"></main>

    <!-- Scorecard (dark tile) -->
    <section id="scorecardSection" class="bg-tile3 text-white">
      <div class="max-w-[1440px] mx-auto px-6 py-16 md:py-[80px]">
        <div class="reveal max-w-[860px] mb-10">
          <div class="text-[14px] tracking-[-0.224px] text-white/50 uppercase" id="scoreEyebrow">Scorecard</div>
          <h2 id="scoreTitle" class="mt-3 text-[34px] md:text-[40px] font-semibold leading-[1.1] tracking-[-0.374px]"></h2>
          <p id="scoreSubtitle" class="mt-4 text-[17px] leading-[1.47] tracking-[-0.374px] text-white/70"></p>
        </div>
        <div id="scoreGrid" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div>
      </div>
    </section>

    <footer class="bg-parchment">
      <div class="max-w-[1440px] mx-auto px-6 py-16">
        <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
          <div class="flex items-center gap-2">
            <i data-lucide="hexagon" class="w-4 h-4 text-ink"></i>
            <span class="text-[17px] font-semibold tracking-[-0.374px] text-ink">Journey Tracker</span>
          </div>
          <span class="text-[12px] tracking-[-0.12px] text-inkmuted">Progress is saved locally in your browser, per track.</span>
        </div>
        <div class="mt-6 pt-6 border-t border-hairline text-[12px] tracking-[-0.12px] text-inkmuted">
          Built for Caleb's two journeys: deep smart contract engineering and Tesla fleet data engineering.
        </div>
      </div>
    </footer>

    <script src="data.js"></script>
    <script src="data-tesla.js"></script>
    <script>
      const KEY = "journey-tracker-progress-v2";
      const ACTIVE_KEY = "journey-tracker-active-v2";
      let state = JSON.parse(localStorage.getItem(KEY) || "{}");
      const save = () => localStorage.setItem(KEY, JSON.stringify(state));

      // ---- Adapter: convert the original Protocol Forge PLAN into the unified shape.
      function adaptProtocolForge(P) {
        return {
          id: "protocol-forge",
          title: P.title,
          subtitle: P.subtitle,
          range: P.range,
          mission: P.mission,
          unitLabel: "Workdays",
          milestoneLabel: "Quality gates",
          groups: P.weeks.map((wk) => ({
            key: `w${wk.n}`,
            tag: `Week ${wk.n}`,
            range: wk.range,
            title: wk.title,
            summary: wk.summary,
            gate: { label: "Friday Quality Gate", text: wk.gate },
            items: wk.days.map((day, di) => ({
              key: `d${di}`,
              eyebrow: day.date,
              title: day.title,
              sections: [
                { label: "Learn", tasks: day.learn },
                { label: "Do", tasks: day.do },
                { label: "Artifact", tasks: day.artifact },
              ],
            })),
          })),
          scorecard: {
            title: "Final Evidence Standard",
            subtitle:
              "What the GitHub should contain by July 31. Deliberately extreme. When breadth conflicts with rigor, keep the math, testing and security work.",
            items: P.evidence,
          },
        };
      }

      const TRACKS = [adaptProtocolForge(window.PLAN), window.TESLA];
      const SECTION_ICON = {
        Learn: "book-open",
        Do: "hammer",
        Artifact: "package-check",
        Features: "layers",
        Metrics: "bar-chart-3",
        "Required DAGs": "git-branch",
        "Required CLI": "terminal",
        "Required checks": "shield-check",
        Concepts: "brain",
        "Interview defense": "message-square",
        Targets: "target",
        Problems: "list-checks",
        "Problems II": "list-checks",
        Core: "database",
        Joins: "database",
        Aggregations: "sigma",
        Windows: "panels-top-left",
        "Time-series": "clock",
        "Fleet analytics": "car",
        Drills: "dumbbell",
        "Python skills": "code",
        "Must know": "book-marked",
        "Data modeling": "table-2",
        "Answer structure": "list-ordered",
        "Follow-ups to practice": "help-circle",
        "AI without exposure": "bot",
      };
      const iconFor = (label) => SECTION_ICON[label] || "check-square";

      const TILE_CYCLE = ["bg-parchment", "bg-white", "bg-tile"];

      // ---- stable id helpers (prefixed by plan id)
      const tid = (pid, gk, ik, si, ti) => `${pid}:${gk}:${ik}:s${si}:t${ti}`;
      const gateId = (pid, gk, ik) => (ik ? `${pid}:igate:${gk}:${ik}` : `${pid}:gate:${gk}`);
      const scoreId = (pid, i) => `${pid}:score:${i}`;

      let plan = null; // active plan
      let MILES = []; // {id} list of all milestones for active plan

      function allItemTaskIds(p, g, it, iIdx) {
        const ids = [];
        it.sections.forEach((sec, si) => sec.tasks.forEach((_, ti) => ids.push(tid(p.id, g.key, it.key, si, ti))));
        return ids;
      }
      function itemComplete(p, g, it) {
        return allItemTaskIds(p, g, it).every((id) => state[id]);
      }
      function allTaskIdsFor(p) {
        const ids = [];
        p.groups.forEach((g) => g.items.forEach((it) => ids.push(...allItemTaskIds(p, g, it))));
        return ids;
      }

      // ---- checkbox markup (Action Blue only)
      function checkbox(id, text, dark) {
        const on = !!state[id];
        return `
        <label class="flex items-start gap-3 py-1.5 cursor-pointer select-none">
          <span class="cbx mt-[2px] shrink-0 w-[20px] h-[20px] rounded-[6px] border flex items-center justify-center transition-all duration-150 ${
            on ? "bg-action border-action" : dark ? "border-white/30" : "border-hairline"
          }">
            <i data-lucide="check" class="w-3.5 h-3.5 text-white ${on ? "" : "opacity-0"}"></i>
          </span>
          <input type="checkbox" class="hidden task-cb" data-id="${id}" ${on ? "checked" : ""} />
          <span class="text-[15px] leading-[1.45] tracking-[-0.224px] ${
            on ? (dark ? "text-white/40 line-through" : "text-inkmuted line-through") : dark ? "text-white/85" : "text-inkmuted80"
          }">${text}</span>
        </label>`;
      }

      function gateBlock(p, gk, ik, gate, dark) {
        const id = gateId(p.id, gk, ik);
        const on = !!state[id];
        return `
          <div class="mt-4 rounded-applelg border ${dark ? "border-white/15 bg-white/5" : "border-hairline bg-white"} p-5">
            <label class="flex items-start gap-3 cursor-pointer select-none">
              <span class="cbx mt-[2px] shrink-0 w-[20px] h-[20px] rounded-[6px] border flex items-center justify-center transition-all duration-150 ${on ? "bg-action border-action" : dark ? "border-white/30" : "border-hairline"}" data-gate="${id}">
                <i data-lucide="check" class="w-3.5 h-3.5 text-white ${on ? "" : "opacity-0"}"></i>
              </span>
              <input type="checkbox" class="hidden gate-cb" data-id="${id}" ${on ? "checked" : ""} />
              <span>
                <span class="flex items-center gap-2 text-[12px] font-semibold uppercase tracking-[0.04em] ${dark ? "text-sky" : "text-action"} mb-1">
                  <i data-lucide="shield-check" class="w-4 h-4"></i> ${gate.label}
                </span>
                <span class="text-[15px] leading-[1.45] tracking-[-0.224px] ${dark ? "text-white/80" : "text-inkmuted80"}">${gate.text}</span>
              </span>
            </label>
          </div>`;
      }

      // ---- render the active plan
      function renderTrack(p) {
        plan = p;
        MILES = [];

        document.getElementById("navTitle").textContent = p.title;
        document.getElementById("subTitle").textContent = p.title;
        document.getElementById("rangeLabel").textContent = p.range;
        document.getElementById("heroTitle").textContent = p.title;
        document.getElementById("heroSubtitle").textContent = p.subtitle;
        document.getElementById("missionText").textContent = p.mission;
        document.getElementById("unitLabel").textContent = (p.unitLabel || "Modules") + " complete";
        document.getElementById("mileLabel").textContent = (p.milestoneLabel || "Milestones") + " passed";
        document.getElementById("tasksTotal").textContent = allTaskIdsFor(p).length;

        // track switcher
        const sw = document.getElementById("trackSwitch");
        sw.innerHTML = "";
        TRACKS.forEach((t) => {
          const active = t.id === p.id;
          const b = document.createElement("button");
          b.role = "tab";
          b.className =
            "press px-5 py-2 rounded-full text-[14px] font-semibold tracking-[-0.224px] transition-colors duration-200 " +
            (active ? "bg-action text-white" : "text-ink hover:bg-parchment");
          b.textContent = t.title;
          b.addEventListener("click", () => {
            if (t.id === plan.id) return;
            localStorage.setItem(ACTIVE_KEY, t.id);
            renderTrack(t);
            window.scrollTo({ top: 0, behavior: "auto" });
          });
          sw.appendChild(b);
        });

        // nav chips (one per group)
        const navWeeks = document.getElementById("navWeeks");
        navWeeks.innerHTML = "";
        p.groups.forEach((g, gi) => {
          const a = document.createElement("a");
          a.href = `#grp-${g.key}`;
          a.textContent = gi + 1;
          a.id = `navchip-${g.key}`;
          a.className =
            "press w-6 h-6 flex items-center justify-center rounded-full text-[12px] text-white/60 hover:text-white transition-colors";
          navWeeks.appendChild(a);
        });

        // groups
        const groupsEl = document.getElementById("groups");
        groupsEl.innerHTML = "";
        p.groups.forEach((g, gi) => {
          const tileClass = TILE_CYCLE[gi % 3];
          const dark = tileClass === "bg-tile";

          if (g.gate) MILES.push(gateId(p.id, g.key, null));
          g.items.forEach((it) => {
            if (it.gate) MILES.push(gateId(p.id, g.key, it.key));
          });

          const section = document.createElement("section");
          section.id = `grp-${g.key}`;
          section.className = `${tileClass} scroll-mt-[96px]`;

          const itemsHtml = g.items
            .map((it) => {
              const secsHtml = it.sections
                .map((sec, si) => {
                  const rows = sec.tasks.map((t, ti) => checkbox(tid(p.id, g.key, it.key, si, ti), t, false)).join("");
                  return `
                  <div>
                    <div class="flex items-center gap-2 mb-2">
                      <i data-lucide="${iconFor(sec.label)}" class="w-4 h-4 text-action"></i>
                      <span class="text-[12px] font-semibold uppercase tracking-[0.04em] text-inkmuted">${sec.label}</span>
                    </div>
                    <div>${rows}</div>
                  </div>`;
                })
                .join("");
              const cols = it.sections.length >= 3 ? "md:grid-cols-3" : it.sections.length === 2 ? "md:grid-cols-2" : "md:grid-cols-1";
              const summaryLine = it.summary
                ? `<p class="text-[14px] leading-[1.45] tracking-[-0.224px] text-inkmuted mt-1 mb-3">${it.summary}</p>`
                : "";
              const itemGate = it.gate ? gateBlock(p, g.key, it.key, it.gate, false) : "";

              return `
              <details class="bg-white border border-hairline rounded-applelg overflow-hidden" data-item="${g.key}:${it.key}">
                <summary class="press flex items-center gap-3 p-5 cursor-pointer">
                  <i data-lucide="chevron-right" class="chev w-5 h-5 text-inkmuted shrink-0"></i>
                  <span class="shrink-0 w-6 h-6 rounded-full border flex items-center justify-center border-hairline" data-itemdot="${g.key}:${it.key}">
                    <i data-lucide="check" class="w-3.5 h-3.5 text-action opacity-0"></i>
                  </span>
                  <div class="flex-1 min-w-0">
                    <div class="text-[12px] tracking-[-0.12px] text-inkmuted tabular-nums">${it.eyebrow}</div>
                    <div class="text-[17px] font-semibold tracking-[-0.374px] text-ink truncate">${it.title}</div>
                  </div>
                  <span class="text-[12px] tracking-[-0.12px] text-inkmuted tabular-nums shrink-0" data-itemprog="${g.key}:${it.key}"></span>
                </summary>
                <div class="px-5 pb-6 pt-1 border-t border-dividersoft">
                  ${summaryLine}
                  <div class="grid grid-cols-1 ${cols} gap-7 ${summaryLine ? "" : "pt-1"}">${secsHtml}</div>
                  ${itemGate}
                </div>
              </details>`;
            })
            .join("");

          section.innerHTML = `
            <div class="max-w-[1440px] mx-auto px-6 py-14 md:py-[72px]">
              <div class="reveal flex flex-col sm:flex-row sm:items-end justify-between gap-4 mb-8 max-w-[1100px]">
                <div>
                  <div class="flex items-center gap-3">
                    <span class="text-[14px] font-semibold tracking-[-0.224px] ${dark ? "text-sky" : "text-action"}">${g.tag}</span>
                    <span class="text-[14px] tracking-[-0.224px] ${dark ? "text-white/50" : "text-inkmuted"} tabular-nums">${g.range || ""}</span>
                  </div>
                  <h2 class="mt-2 text-[28px] md:text-[34px] font-semibold leading-[1.1] tracking-[-0.374px] ${dark ? "text-white" : "text-ink"}">${g.title}</h2>
                  <p class="mt-3 text-[17px] leading-[1.47] tracking-[-0.374px] ${dark ? "text-white/70" : "text-inkmuted80"} max-w-[820px]">${g.summary || ""}</p>
                </div>
                <div class="shrink-0 text-right">
                  <div class="text-[12px] tracking-[-0.12px] ${dark ? "text-white/50" : "text-inkmuted"} uppercase">Progress</div>
                  <div class="text-[34px] font-semibold tracking-[-0.5px] tabular-nums ${dark ? "text-white" : "text-ink"}" id="grppct-${g.key}">0%</div>
                </div>
              </div>
              <div class="space-y-3">${itemsHtml}</div>
              ${g.gate ? gateBlock(p, g.key, null, g.gate, dark) : ""}
            </div>`;
          groupsEl.appendChild(section);
        });

        // scorecard
        const sc = p.scorecard;
        document.getElementById("scoreTitle").textContent = sc.title;
        document.getElementById("scoreSubtitle").textContent = sc.subtitle;
        const scoreGrid = document.getElementById("scoreGrid");
        scoreGrid.innerHTML = "";
        sc.items.forEach((e, i) => {
          const id = scoreId(p.id, i);
          const on = !!state[id];
          const label = document.createElement("label");
          label.className =
            "flex items-start gap-3 p-4 rounded-applemd border cursor-pointer select-none transition-colors duration-200 " +
            (on ? "border-action bg-action/10" : "border-white/15 bg-white/5");
          label.innerHTML = `
            <span class="cbx mt-[2px] shrink-0 w-[20px] h-[20px] rounded-[6px] border flex items-center justify-center transition-all duration-150 ${on ? "bg-action border-action" : "border-white/30"}">
              <i data-lucide="check" class="w-3.5 h-3.5 text-white ${on ? "" : "opacity-0"}"></i>
            </span>
            <input type="checkbox" class="hidden task-cb" data-id="${id}" ${on ? "checked" : ""} />
            <span class="text-[15px] leading-[1.45] tracking-[-0.224px] ${on ? "text-white/60" : "text-white/90"}">${e}</span>`;
          scoreGrid.appendChild(label);
        });

        // milestone dots
        const mileDots = document.getElementById("mileDots");
        mileDots.innerHTML = "";
        MILES.forEach((mid) => {
          const d = document.createElement("div");
          d.id = `miledot-${mid}`;
          d.className = "h-1.5 flex-1 min-w-[10px] rounded-full bg-dividersoft transition-colors duration-300";
          mileDots.appendChild(d);
        });

        // reveal observer (fresh nodes)
        document.querySelectorAll(".reveal").forEach((el) => io.observe(el));

        lucide.createIcons();
        recompute();
      }

      function recompute() {
        const p = plan;
        const ids = allTaskIdsFor(p);
        const done = ids.filter((id) => state[id]).length;
        const total = ids.length;
        const pct = total ? Math.round((done / total) * 100) : 0;
        document.getElementById("tasksDone").textContent = done;
        document.getElementById("ringPct").textContent = pct + "%";
        document.getElementById("navPct").textContent = pct + "%";
        const C = 2 * Math.PI * 48;
        document.getElementById("ringMain").style.strokeDashoffset = C - (C * pct) / 100;

        // items
        let itemsDone = 0;
        let itemsTotal = 0;
        p.groups.forEach((g) => {
          let gDone = 0;
          const gTaskIds = [];
          g.items.forEach((it) => {
            itemsTotal++;
            const itIds = allItemTaskIds(p, g, it);
            gTaskIds.push(...itIds);
            const c = itIds.every((id) => state[id]);
            if (c) itemsDone++;
            const itDone = itIds.filter((id) => state[id]).length;
            const dot = document.querySelector(`[data-itemdot="${g.key}:${it.key}"]`);
            if (dot) {
              const ic = dot.querySelector("i");
              dot.classList.toggle("bg-action", c);
              dot.classList.toggle("border-action", c);
              dot.classList.toggle("border-hairline", !c);
              ic.classList.toggle("text-white", c);
              ic.classList.toggle("text-action", !c);
              ic.classList.toggle("opacity-0", !c);
            }
            const lbl = document.querySelector(`[data-itemprog="${g.key}:${it.key}"]`);
            if (lbl) lbl.textContent = `${itDone}/${itIds.length}`;
          });
          gDone = gTaskIds.filter((id) => state[id]).length;
          const gp = gTaskIds.length ? Math.round((gDone / gTaskIds.length) * 100) : 0;
          const gel = document.getElementById(`grppct-${g.key}`);
          if (gel) gel.textContent = gp + "%";
          const chip = document.getElementById(`navchip-${g.key}`);
          if (chip) {
            const full = gp === 100;
            chip.classList.toggle("bg-action", full);
            chip.classList.toggle("text-white", full);
            chip.classList.toggle("text-white/60", !full);
          }
        });
        document.getElementById("itemsDone").textContent = itemsDone;
        document.getElementById("itemsTotal").textContent = itemsTotal;
        document.getElementById("itemsBar").style.width = (itemsTotal ? (itemsDone / itemsTotal) * 100 : 0) + "%";

        // milestones
        let milesDone = 0;
        MILES.forEach((mid) => {
          const on = !!state[mid];
          if (on) milesDone++;
          const dot = document.getElementById(`miledot-${mid}`);
          if (dot) {
            dot.classList.toggle("bg-action", on);
            dot.classList.toggle("bg-dividersoft", !on);
          }
        });
        document.getElementById("milesDone").textContent = milesDone;
        document.getElementById("milesTotal").textContent = MILES.length;

        // gate checkbox visuals
        document.querySelectorAll("[data-gate]").forEach((box) => {
          const on = !!state[box.dataset.gate];
          const ic = box.querySelector("i");
          box.classList.toggle("bg-action", on);
          box.classList.toggle("border-action", on);
          if (ic) ic.classList.toggle("opacity-0", !on);
        });

        // sub-nav stats
        document.getElementById("subStats").textContent =
          `${itemsDone}/${itemsTotal} ${p.unitLabel || "modules"} · ${milesDone}/${MILES.length} ${p.milestoneLabel || "milestones"}`;
      }

      // checkbox toggling
      document.addEventListener("change", (e) => {
        const cb = e.target.closest(".task-cb, .gate-cb");
        if (!cb) return;
        if (cb.checked) state[cb.dataset.id] = true;
        else delete state[cb.dataset.id];
        save();
        // update this checkbox's own visual immediately
        const label = cb.closest("label");
        const box = label.querySelector(".cbx");
        if (box) box.querySelector("i").classList.toggle("opacity-0", !cb.checked);
        recompute();
      });

      // reset (active track only)
      document.getElementById("resetBtn").addEventListener("click", () => {
        if (!confirm(`Reset all progress for "${plan.title}"? This clears every checkbox in this track.`)) return;
        const prefix = plan.id + ":";
        Object.keys(state).forEach((k) => {
          if (k.startsWith(prefix)) delete state[k];
        });
        save();
        renderTrack(plan);
        window.scrollTo({ top: 0, behavior: "auto" });
      });

      // reading progress bar
      const bar = document.getElementById("progress-bar");
      window.addEventListener(
        "scroll",
        () => {
          const h = document.documentElement.scrollHeight - window.innerHeight;
          bar.style.width = (h > 0 ? (window.scrollY / h) * 100 : 0) + "%";
        },
        { passive: true }
      );

      // reveal observer
      const io = new IntersectionObserver(
        (entries) => {
          entries.forEach((en) => {
            if (en.isIntersecting) {
              en.target.classList.add("visible");
              io.unobserve(en.target);
            }
          });
        },
        { threshold: 0.1 }
      );

      // boot
      const savedActive = localStorage.getItem(ACTIVE_KEY);
      const initial = TRACKS.find((t) => t.id === savedActive) || TRACKS[0];
      renderTrack(initial);
    </script>
  </body>
</html>
